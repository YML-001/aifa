<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>学工 AI 助手 · 中南大学智慧学工</title>
<link rel="stylesheet" href="mobile-common.css">
<style>
body{padding-bottom:0}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 48px);overflow:hidden}
.chat-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.bubble-row{display:flex;gap:10px;max-width:92%}
.bubble-row.ai{align-self:flex-start}
.bubble-row.user{align-self:flex-end;flex-direction:row-reverse}
.bubble-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:#fff;font-weight:700}
.bubble-row.ai .bubble-ava{background:linear-gradient(135deg,var(--blue),var(--cyan))}
.bubble-row.user .bubble-ava{background:linear-gradient(135deg,var(--orange),#FFA940)}
.bubble{padding:12px 14px;border-radius:16px;font-size:13px;line-height:1.7;position:relative;word-break:break-word}
.bubble-row.ai .bubble{background:#fff;border-top-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.06);color:#1D2129}
.bubble-row.user .bubble{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-top-right-radius:4px}
.bubble .time{font-size:10px;color:var(--gray);margin-top:6px;display:block}
.bubble-row.user .bubble .time{color:rgba(255,255,255,.65);text-align:right}
.bubble h4{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--blue)}
.bubble-row.user .bubble h4{color:#fff}
.bubble ol,.bubble ul{padding-left:18px;margin:4px 0}
.bubble li{margin-bottom:2px}
.bubble .tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;background:#E8F3FF;color:var(--blue);margin-right:4px;margin-top:4px}
.bubble .discl{font-size:10px;color:var(--gray);margin-top:6px;font-style:italic}
.typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:typing-blink 1.2s infinite;margin-right:4px}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing-blink{0%,100%{opacity:.3}50%{opacity:1}}
.chips-bar{flex-shrink:0;display:flex;flex-wrap:nowrap;gap:8px;padding:8px 14px;background:#fff;border-top:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.chips-bar::-webkit-scrollbar{display:none}
.chips-bar .chip-btn{cursor:pointer;padding:7px 14px;border-radius:999px;font-size:12px;background:#F2F6FF;color:var(--blue);border:1px solid #D0E4FF;white-space:nowrap;flex-shrink:0}
.chips-bar .chip-btn:active{background:var(--blue);color:#fff}
.input-bar{flex-shrink:0;background:#fff;border-top:1px solid var(--border);padding:8px 12px calc(8px + var(--safe-b));display:flex;align-items:flex-end;gap:8px}
.input-bar textarea{flex:1;border:1px solid #E5E6EB;border-radius:14px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:0;min-height:40px;max-height:100px;line-height:1.4;background:var(--bg)}
.input-bar textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(22,93,255,.08);background:#fff}
.input-bar .send{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border:0;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer;transition:transform .1s}
.input-bar .send:active{transform:scale(.9)}
.input-bar .send:disabled{opacity:.5}
.mode-tag{font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;font-weight:600}
.mode-tag.demo{background:#FFF3E8;color:var(--orange)}
.mode-tag.live{background:#E8FFEA;color:var(--green)}
.clear-btn{font-size:12px;color:var(--gray);padding:4px 8px;border-radius:6px;border:0;background:transparent}
.clear-btn:active{background:#F2F3F5}
</style>
</head>
<body>

<div class="m-nav">
  <a class="back" href="../mobile-entry.html">‹</a>
  <div class="title">学工 AI 助手 <span id="mode-tag" class="mode-tag demo">Demo</span></div>
  <button class="clear-btn" id="clear-btn" type="button">清空</button>
</div>

<div class="chat-wrap">
  <div class="chat-area" id="chat-area">
    <div class="bubble-row ai">
      <div class="bubble-ava">AI</div>
      <div class="bubble">
        你好呀！我是中南大学智慧学工 AI 助手 🎓<br>
        我可以帮你查询综测、奖学金、请假流程、宿舍报修等学工问题。试试下面的快捷提问，或直接输入你的问题！
        <span class="time" id="welcome-time"></span>
      </div>
    </div>
  </div>

  <div class="chips-bar" id="chips-bar">
    <span class="chip-btn" data-q="综测什么时候截止">📊 综测截止</span>
    <span class="chip-btn" data-q="奖学金申请条件是什么">🏆 奖学金条件</span>
    <span class="chip-btn" data-q="怎么请病假">🗓️ 请假流程</span>
    <span class="chip-btn" data-q="宿舍空调坏了怎么报修">🔧 宿舍报修</span>
    <span class="chip-btn" data-q="第二课堂学分怎么算">🎓 二课学分</span>
    <span class="chip-btn" data-q="校园卡丢了怎么办">💳 校园卡</span>
    <span class="chip-btn" data-q="就业签约流程">💼 就业签约</span>
  </div>

  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="输入你的问题…"></textarea>
    <button class="send" id="send-btn" type="button">➤</button>
  </div>
</div>

<script src="../ai-client.js"></script>
<script src="../ai-search-popup.js"></script>
<script src="../ai-float-ball.js"></script>
<script src="../ai-module-sdk.js"></script>
<script>
(function(){
  var chatArea = document.getElementById('chat-area');
  var msgInput = document.getElementById('msg-input');
  var sendBtn = document.getElementById('send-btn');
  var chipsBar = document.getElementById('chips-bar');
  var clearBtn = document.getElementById('clear-btn');
  var modeTag = document.getElementById('mode-tag');
  var chatHistory = [];
  var isGenerating = false;

  function now(){
    var d = new Date();
    return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  }
  document.getElementById('welcome-time').textContent = now();

  function updateMode(){
    var m = AI.effectiveMode();
    modeTag.className = 'mode-tag ' + (m==='live'?'live':'demo');
    modeTag.textContent = m==='live'?'Live':'Demo';
  }
  updateMode();

  function appendBubble(role, html){
    var row = document.createElement('div');
    row.className = 'bubble-row ' + role;
    var ava = document.createElement('div');
    ava.className = 'bubble-ava';
    ava.textContent = role === 'ai' ? 'AI' : '梧';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html + '<span class="time">' + now() + '</span>';
    row.appendChild(ava);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function showTyping(){
    var row = document.createElement('div');
    row.className = 'bubble-row ai';
    row.id = 'typing-indicator';
    row.innerHTML = '<div class="bubble-ava">AI</div><div class="bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping(){
    var el = document.getElementById('typing-indicator');
    if(el) el.remove();
  }

  function escHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function send(q){
    if(!q || isGenerating) return;
    isGenerating = true;
    sendBtn.disabled = true;

    appendBubble('user', escHtml(q));
    chatHistory.push({role:'user', content:q});

    showTyping();
    msgInput.value = '';
    autoResize();

    var sysHint = '你是中南大学智慧学工 AI 助手，服务学生。回答务必简洁、结构化、中文，涉及政策规则时标注"（以学校正式文件为准）"。每次回答控制在150字以内。';
    var msgs = [{role:'system',content:sysHint}].concat(chatHistory);

    try{
      var bubble = null;
      var r = await AI.chat(msgs, {
        onDelta: function(delta, full){
          removeTyping();
          if(!bubble){
            bubble = appendBubble('ai', '');
          }
          var timeEl = bubble.querySelector('.time');
          var rendered = AI.renderMd ? AI.renderMd(full) : full.replace(/\n/g,'<br>');
          bubble.innerHTML = rendered + '<div class="discl">AI 生成，仅供参考</div><span class="time">' + now() + '</span>';
          chatArea.scrollTop = chatArea.scrollHeight;
        }
      });

      removeTyping();
      if(!bubble){
        var text = (r && r.text) || '暂时无法回复，请稍后重试。';
        var rendered = AI.renderMd ? AI.renderMd(text) : text.replace(/\n/g,'<br>');
        appendBubble('ai', rendered + '<div class="discl">AI 生成，仅供参考</div>');
      }
      chatHistory.push({role:'assistant', content:(r&&r.text)||''});
    }catch(e){
      removeTyping();
      appendBubble('ai', '<span style="color:var(--red)">抱歉，出了点问题：' + escHtml(e.message||''+e) + '</span>');
    }finally{
      isGenerating = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.onclick = function(){ send(msgInput.value.trim()); };
  msgInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      send(msgInput.value.trim());
    }
  });

  function autoResize(){
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
  }
  msgInput.addEventListener('input', autoResize);

  Array.prototype.forEach.call(chipsBar.querySelectorAll('.chip-btn'), function(el){
    el.addEventListener('click', function(){
      send(el.getAttribute('data-q'));
    });
  });

  clearBtn.onclick = function(){
    chatHistory = [];
    chatArea.innerHTML = '';
    appendBubble('ai', '对话已清空，有新问题随时问我！ 🎓<div class="discl">AI 助手已就绪</div>');
  };

  if(window.AIBall && window.AIBall.hide) window.AIBall.hide();
})();
</script>
</body>
</html>
